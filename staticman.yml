# 属性名称。您可以在网站的不同部分使用多个具有完全不同配置块的属性。
# 例如，您可以一个属性用于处理评论提交，另一个用于处理文章。
# 加密字符串请使用以下端点：
# https://{STATICMAN API INSTANCE}/v3/encrypt/{要加密的文本}
# {STATICMAN API INSTANCE} 应与主题配置文件中的 `endpoint` 相匹配。

comments:
  # (*) 必填
  #
  # 表单允许提交的字段名称列表。如果请求中包含此处未列出的字段，将抛出错误。
  allowedFields: ["name", "email", "url", "message"]

  # (*) 使用通知功能时必填
  #
  # 当定义了 allowedOrigins 时，只接受来自所列域名之一的请求。
  # 来源作为 `options` 对象的一部分发送（例如 <input name="options[origin]" value="https://yourdomain.com/post1"）
  # allowedOrigins: ["https://example.com"]

  # (*) 必填
  #
  # 所使用的分支名称。必须与主题配置文件中的 `branch` 一致。
  branch: "master"   #  用户页面使用 "master"，项目页面使用 "gh-pages"

  commitMessage: "来自 {fields.name} 的新评论"

  # (*) 必填
  #
  # 数据文件的目标路径（文件名）。支持占位符。
  filename: "comment-{@timestamp}"

  # 生成的数据文件格式。可选值为 "json"、"yaml" 或 "frontmatter"
  format: "yaml"

  # 由 Staticman 自动填充并包含在数据文件中的字段列表。
  # 键为字段名。值可以是一个带有 `type` 属性的对象（用于配置生成的字段），
  # 也可以是直接使用的任何值（如字符串、数字或数组）。
  generatedFields:
    date:
      type: "date"
      options:
        format: "iso8601" # "iso8601"（默认）、"timestamp-seconds"、"timestamp-milliseconds"

  # 是否需要在评论发布到主分支前进行审批。
  # 如果设为 `true`，将创建一个拉取请求供您审批。
  # 否则，评论将自动发布到主分支。
  moderation: false

  # Akismet 垃圾评论检测。
  # akismet:
  #   enabled: true
  #   author: "name"
  #   authorEmail: "email"
  #   authorUrl: "url"
  #   content: "message"
  #   type: "comment"

  # 网站名称。用于通知邮件中。
  # name: "您的网站"

  # 通知设置。启用后，当有人回复或发表新评论时，用户可以选择通过电子邮件接收通知。
  # 这需要拥有 Mailgun 账户，您可以在 https://mailgun.com 免费获取。
  # notifications:
    # 启用通知
    # enabled: true

    # (!) 加密
    #
    # Mailgun API 密钥
    # apiKey: ""

    # (!) 加密
    #
    # Mailgun 域名（加密）
    # domain: ""

  # (*) 必填
  #
  # 数据文件的目标路径（目录）。支持占位符。
  path: "_data/comments/{options.slug}" # （默认）

  # 必填字段列表。如果请求中缺少其中任何一个或为空，将抛出错误。
  requiredFields: ["name", "email", "message"]

  # 应用于所提供字段的转换列表。键为字段名，值为转换类型。
  transforms:
    email: md5

  # reCAPTCHA（可选）
  # 启用 reCAPTCHA：
  # 1. 将 `enabled` 设为 `true`
  # 2. 在 https://www.google.com/recaptcha/ 注册您的域名并选择 reCAPTCHA V2
  # 3. 取消注释 `siteKey` 和 `secret` 并填入您的值
  reCaptcha:
    enabled: false
    #siteKey: ""
    # 使用 Staticman 的 /encrypt 端点加密 reCAPTCHA 密钥
    # 即 https://{STATICMAN API INSTANCE}/v3/encrypt/{您的站点密钥}
    # 更多信息请访问 https://staticman.net/docs/encryption
    #secret: ""
